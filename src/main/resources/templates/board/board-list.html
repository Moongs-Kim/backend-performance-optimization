<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragment/base-layout :: base-layout(
            ~{::title}, ~{::link}, ~{::script},
            ~{fragment/main-layout :: main-layout(~{::main})}
      )}">
<head>
    <title>Predawn Days Boards</title>
    <link rel="stylesheet" th:href="@{/css/common/main-common.css}">
    <link rel="stylesheet" th:href="@{/css/board/board-list.css}">
    <script th:src="@{/js/board/list/board-list.js}" defer></script>
</head>
<body>
<main>
    <div class="main-inner">
        <h1>게시판</h1>

        <div class="board-search">
            <form action="/boards" method="get" class="search-form">

                <select name="searchType" class="search-select">
                    <option value="title" th:selected="${param.searchType != null and #strings.equalsIgnoreCase(param.searchType[0], 'title')}">제목</option>
                    <option value="writer" th:selected="${param.searchType != null and #strings.equalsIgnoreCase(param.searchType[0], 'writer')}">작성자</option>
                </select>

                <input type="text"
                       name="keyword"
                       th:value="${param.keyword}"
                       class="search-input"
                       placeholder="검색어를 입력하세요">

                <input type="hidden" name="sortType" th:value="${param.sortType}">

                <button type="submit" class="search-btn">검색</button>
            </form>
        </div>

        <div class="board-top-bar">
            <div class="board-left">
                <form action="/boards" method="get">

                    <input type="hidden" name="searchType" th:value="${param.searchType}">
                    <input type="hidden" name="keyword" th:value="${param.keyword}">

                    <select name="sortType"
                            class="sort-select"
                            onchange="this.form.submit()">
                        <option value="latest" th:selected="${param.sortType != null and #strings.equalsIgnoreCase(param.sortType[0], 'latest')}">최신순</option>
                        <option value="view_count" th:selected="${param.sortType != null and #strings.equalsIgnoreCase(param.sortType[0], 'view_count')}">조회순</option>
                        <option value="latest_top_n_like_count" th:selected="${param.sortType != null and #strings.equalsIgnoreCase(param.sortType[0], 'latest_top_n_like_count')}">최신 100개 좋아요순</option>
                    </select>
                </form>
            </div>

            <div class="board-right">
                <a href="/board/write" class="write-btn">게시판 작성</a>
            </div>
        </div>

        <div class="board-list" th:unless="${boardList.isEmpty()}">
            <div class="board-header">
                <span class="col-title">제목</span>
                <span class="col-writer">작성자</span>
                <span class="col-date">작성일</span>
                <span class="col-like">좋아요</span>
                <span class="col-view">조회</span>
            </div>

            <div class="board-row" th:each="board : ${boardList}" th:data-board-id="${board.boardId}">
                <span class="col-title" th:text="${board.title}">게시글 제목</span>
                <span class="col-writer" th:text="${board.memberName}">작성자</span>
                <span class="col-date" th:text="${board.createdBoardDate}">2026-01-28</span>
                <span class="col-like" th:text="|♥ ${board.likeCount}|">♥ 70</span>
                <span class="col-view" th:text="${board.viewCount}">104</span>
            </div>
        </div>

        <div class="board-empty" th:if="${boardList.isEmpty()}">
            <div class="empty-inner" th:if="${param.searchType != null}">
                <div class="empty-icon">○</div>

                <h3 class="empty-title">조회된 게시글이 없습니다</h3>

                <p class="empty-desc">
                    검색 조건에 맞는 게시글이 없습니다<br>
                    다른 키워드로 검색해보세요
                </p>

                <a href="/board/write" class="empty-write-btn">
                    게시판 작성하기
                </a>
            </div>

            <div class="empty-inner" th:if="${param.searchType == null}">
                <div class="empty-icon">○</div>

                <h3 class="empty-title">아직 작성된 게시글이 없습니다</h3>

                <a href="/board/write" class="empty-write-btn">
                    게시판 작성하기
                </a>
            </div>
        </div>

        <!-- 페이지 네이션 -->
        <div class="pagination" th:unless="${boardList.isEmpty()}">
            <a th:href="@{/boards(pageIndex=${paging.nowPage} - 1, searchType=${param.searchType}, keyword=${param.keyword}, sortType=${param.sortType})}"
               class="page-btn prev" th:classappend="${!paging.hasPreviousPage} ? 'disabled' : ''">&lt;</a>

            <th:block th:unless="${paging.isFirstBlock}">
                <a th:href="@{/boards(pageIndex=0, searchType=${param.searchType}, keyword=${param.keyword}, sortType=${param.sortType})}"
                   class="page-num" th:text="1">1</a>
                <span class="page-ellipsis">•••</span>
            </th:block>

            <a th:each="pageNum : ${#numbers.sequence(paging.beginPage, paging.endPage)}"
               th:href="@{/boards(pageIndex=${pageNum}, searchType=${param.searchType}, keyword=${param.keyword}, sortType=${param.sortType})}"
               th:text="${pageNum} + 1"
               class="page-num" th:classappend="${pageNum == paging.nowPage} ? 'active' : ''">1</a>

            <th:block th:unless="${paging.isLastBlock}">
                <span class="page-ellipsis">•••</span>
                <a th:href="@{/boards(pageIndex=${paging.totalPage} - 1, searchType=${param.searchType}, keyword=${param.keyword}, sortType=${param.sortType})}"
                   class="page-num" th:text="${paging.totalPage}">1</a>
            </th:block>

            <a th:href="@{/boards(pageIndex=${paging.nowPage} + 1, searchType=${param.searchType}, keyword=${param.keyword}, sortType=${param.sortType})}"
               class="page-btn next" th:classappend="${!paging.hasNextPage} ? 'disabled' : ''">&gt;</a>
        </div>
    </div>
</main>
</body>
</html>
