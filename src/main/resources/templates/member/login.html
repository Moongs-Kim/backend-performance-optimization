<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragment/base-layout :: base-layout(
            ~{::title}, ~{::link}, ~{::script}, ~{::div[@class='container']})}">
<head>
    <title>Predawn Days Login</title>
    <link rel="stylesheet" th:href="@{/css/member/login.css}">
    <link rel="stylesheet" th:href="@{/css/common/not-main-footer.css}">
    <script th:src="@{/js/member/login/login.js}" defer></script>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo"><a href="/" th:text="'Predawn Days'">LOGO</a></div>

            <form action="/login" method="post" th:object="${loginForm}">
                <input type="hidden" name="redirectURL" th:value="${redirectURL}">

                <div class="form-group">
                    <label for="loginId">아이디</label>
                    <input type="text" th:field="*{loginId}" placeholder="아이디를 입력하세요">
                    <span class="field-error" th:errors="*{loginId}">아이디를 입력</span>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" th:field="*{password}" placeholder="비밀번호를 입력하세요">
                    <span class="field-error" th:errors="*{password}">비밀번호를 입력</span>
                </div>

                <div class="field-error password-not-match" th:if="${#fields.hasGlobalErrors()}"
                      th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

                <button type="submit" id="login-btn">로그인</button>
            </form>

            <div class="links">
                <a href="#">아이디 찾기</a><span>|</span>
                <a href="#">비밀번호 찾기</a><span>|</span>
                <a href="/signup">회원가입</a>
            </div>
        </div>
    </div>
</body>
</html>
